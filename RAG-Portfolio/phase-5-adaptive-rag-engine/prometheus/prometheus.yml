global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape our FastAPI app's /metrics endpoint
  - job_name: "adaptive-rag-api"
    static_configs:
      - targets: ["host.docker.internal:8080"]

  # Scrape Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]